<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Function Plotter</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: #ccc;
            font-family: 'Fira Code', monospace, consolas, courier;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        h1 {
            font-size: 120px;
            color: #333;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        p {
            font-size: 18px;
            color: #666;
            margin: 0 0 30px;
        }
        a {
            font-size: 14px;
            color: #333;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #666;
            border-radius: 4px;
            transition: all 0.2s;
        }
        a:hover {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>404</h1>
    <p>Page not found</p>
    <a href="/">Back to Home</a>
</div>
</body>
</html>
